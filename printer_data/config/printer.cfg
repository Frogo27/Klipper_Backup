# =============================================================================
# ENDER 3 V3 SE - printer.cfg
# Load Cell Probe (HX711, front-left under-bed) for Z homing
# CR Touch (BLTouch) for bed mesh only
# =============================================================================

# -----------------------------------------------------------------------------
# TEMPERATURE SENSORS
# -----------------------------------------------------------------------------
[temperature_sensor MCU]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

[temperature_sensor Orange_Pi]
sensor_type: temperature_host
min_temp: 0
max_temp: 100

[temperature_sensor RP2040]
sensor_type: temperature_RP2040
min_temp: 0
max_temp: 100

# -----------------------------------------------------------------------------
# INCLUDES
# -----------------------------------------------------------------------------
[include clean_backups.cfg]
[include shell_command.cfg]
[include mainsail.cfg]
[include reshelper.cfg]
[exclude_object]
[include KAMP_Settings.cfg]
[include MACRO.cfg]
[include rp2040.cfg]
[include sp_mmu.cfg]

# -----------------------------------------------------------------------------
# MCU
# -----------------------------------------------------------------------------
[mcu]
serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0
restart_method: command

# -----------------------------------------------------------------------------
# MISC FEATURES
# -----------------------------------------------------------------------------
[firmware_retraction]
retract_length: 0.8
retract_speed: 60
unretract_extra_length: 0
unretract_speed: 60

[virtual_sdcard]
path: ~/printer_data/gcodes

[display_status]
[pause_resume]
[gcode_arcs]

# -----------------------------------------------------------------------------
# INPUT SHAPER
# -----------------------------------------------------------------------------
[input_shaper]
shaper_freq_x: 50
shaper_type_x: mzv
damping_ratio_x: 0.082

shaper_freq_y: 38.8
shaper_type_y: mzv
damping_ratio_y: 0.0683

# -----------------------------------------------------------------------------
# LOAD CELL (Hardware Definition)
# -----------------------------------------------------------------------------
[load_cell]
sensor_type: hx711
sclk_pin: PA4
dout_pin: PC6

# -----------------------------------------------------------------------------
# LOAD CELL PROBE (The Z-Homing Logic)
# -----------------------------------------------------------------------------
[load_cell_probe]
load_cell: load_cell
sensor_type: hx711
sclk_pin: PA4                # Repeated here for Klipper validation
dout_pin: PC6                # Repeated here for Klipper validation
z_offset: 0.0                # True nozzle contact = 0 offset
trigger_force: 50           
force_safety_limit: 2000    
speed: 2                    
samples: 2
sample_retract_dist: 2.0
samples_tolerance: 0.050
samples_tolerance_retries: 3

# -----------------------------------------------------------------------------
# STEPPER X
# -----------------------------------------------------------------------------
[stepper_x]
step_pin: PC2
dir_pin: !PB9
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: ~!PA5
position_endstop: -6
position_min: -6
position_max: 230
homing_speed: 80

[tmc2208 stepper_x]
uart_pin: PB12
run_current: 0.7
sense_resistor: 0.150
interpolate: True

# -----------------------------------------------------------------------------
# STEPPER Y
# -----------------------------------------------------------------------------
[stepper_y]
step_pin: PB8
dir_pin: PB7
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: ~!PA6
position_endstop: -14
position_min: -14
position_max: 230
homing_speed: 80

[tmc2208 stepper_y]
uart_pin: PB13
run_current: 0.8
sense_resistor: 0.150
interpolate: True

# -----------------------------------------------------------------------------
# STEPPER Z (Configured for Load Cell Homing)
# -----------------------------------------------------------------------------
[stepper_z]
step_pin: PB6
dir_pin: !PB5
enable_pin: !PC3
microsteps: 16
rotation_distance: 8
endstop_pin: ^PB0          # Dummy pin (beeper) - Homing override intercepts this
position_endstop: 0
position_min: -3
position_max: 225
homing_speed: 2             
second_homing_speed: 1
homing_retract_dist: 0      

[tmc2208 stepper_z]
uart_pin: PB14
run_current: 0.8
sense_resistor: 0.150
interpolate: True

# -----------------------------------------------------------------------------
# EXTRUDER
# -----------------------------------------------------------------------------
[extruder]
max_extrude_cross_section: 5
max_extrude_only_distance: 1000.0
step_pin: PB4
dir_pin: PB3
enable_pin: !PC3
microsteps: 16
rotation_distance: 7.44
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PA1
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC5
min_temp: 0
max_temp: 260
max_extrude_only_velocity: 15
max_extrude_only_accel: 3000
min_extrude_temp: 170

# -----------------------------------------------------------------------------
# HEATED BED
# -----------------------------------------------------------------------------
[heater_bed]
heater_pin: PB2
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
min_temp: 0
max_temp: 100

# -----------------------------------------------------------------------------
# FANS
# -----------------------------------------------------------------------------
[heater_fan hotend_fan]
pin: PA0

[fan]
pin: PC1

# -----------------------------------------------------------------------------
# PRINTER
# -----------------------------------------------------------------------------
[printer]
kinematics: cartesian
max_velocity: 400
max_accel: 6000
max_z_velocity: 5
square_corner_velocity: 5.0
max_z_accel: 100

# -----------------------------------------------------------------------------
# CR TOUCH (BLTouch) — BED MESH ONLY
# -----------------------------------------------------------------------------
[bltouch]
sensor_pin: ^PC14
control_pin: PC13
x_offset: -23.0
y_offset: -14.5
speed: 20
pin_move_time: 0.4
stow_on_each_sample: False
probe_with_touch_mode: True

# -----------------------------------------------------------------------------
# HOMING OVERRIDE
# -----------------------------------------------------------------------------
[homing_override]
axes: xyz
gcode:
    G90
    G1 Z10 F600           ; Safety lift
    
    {% if 'x' not in printer.toolhead.homed_axes %}
        G28 X
    {% endif %}
    {% if 'y' not in printer.toolhead.homed_axes %}
        G28 Y
    {% endif %}

    _HOME_Z

[gcode_macro _HOME_Z]
gcode:
    SET_GCODE_OFFSET Z=0
    G90
    G1 X54.5 Y45.5 F6000   ; Move NOZZLE over front-left load cell
    
    SET_KINEMATIC_POSITION Z={printer.toolhead.axis_maximum[2]}
    
    PROBE PROBE_SPEED=120  ; 2mm/s
    _HOME_Z_FROM_LAST_PROBE
    
    G91
    G1 Z2 F120
    G90
    
    PROBE PROBE_SPEED=60   ; 1mm/s
    _HOME_Z_FROM_LAST_PROBE
    
    G1 Z10 F600

[gcode_macro _HOME_Z_FROM_LAST_PROBE]
gcode:
    {% set z_probed   = printer.probe.last_probe_position.z %}
    {% set z_position = printer.toolhead.position[2] %}
    {% set z_actual   = z_position - z_probed %}
    SET_KINEMATIC_POSITION Z={z_actual}

# -----------------------------------------------------------------------------
# BED MESH
# -----------------------------------------------------------------------------
[bed_mesh]
speed: 120
horizontal_move_z: 5
mesh_min: 30,30
mesh_max: 207,215.5
probe_count: 13,13
algorithm: bicubic

# -----------------------------------------------------------------------------
# SCREW TILT ADJUST
# -----------------------------------------------------------------------------
[screws_tilt_adjust]
screw4: 54.5, 45.5
screw4_name: front left screw
screw2: 224.5, 45.5
screw2_name: front right screw
screw3: 224.5, 215.5
screw3_name: rear right screw
screw1: 54.5, 215.5
screw1_name: rear left screw
horizontal_move_z: 10.
speed: 50.
screw_thread: CCW-M4

