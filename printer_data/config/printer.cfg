# =============================================================================
# ENDER 3 V3 SE - printer.cfg
# Load Cell Probe (HX711, front-left under-bed) for Z homing
# CR Touch (BLTouch) for bed mesh only
# =============================================================================

# -----------------------------------------------------------------------------
# TEMPERATURE SENSORS
# -----------------------------------------------------------------------------
[temperature_sensor MCU]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

[temperature_sensor Orange_Pi]
sensor_type: temperature_host
min_temp: 0
max_temp: 100

[temperature_sensor RP2040]
sensor_type: temperature_RP2040
min_temp: 0
max_temp: 100

# -----------------------------------------------------------------------------
# INCLUDES
# -----------------------------------------------------------------------------
[include clean_backups.cfg]
[include shell_command.cfg]
[include mainsail.cfg]
#[include led_actions.cfg]
[include reshelper.cfg]
[exclude_object]
[include KAMP_Settings.cfg]
#[include filament_sensor.cfg]
[include MACRO.cfg]
[include rp2040.cfg]
#[include accelerometer.cfg]
[include sp_mmu.cfg]

# -----------------------------------------------------------------------------
# MCU
# -----------------------------------------------------------------------------
[mcu]
serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0
restart_method: command

# -----------------------------------------------------------------------------
# MISC FEATURES
# -----------------------------------------------------------------------------
[firmware_retraction]
retract_length: 0.8
retract_speed: 60
unretract_extra_length: 0
unretract_speed: 60

[virtual_sdcard]
path: ~/printer_data/gcodes

[display_status]
[pause_resume]
[gcode_arcs]

# -----------------------------------------------------------------------------
# INPUT SHAPER
# -----------------------------------------------------------------------------
[input_shaper]
shaper_freq_x: 50
shaper_type_x: mzv
damping_ratio_x: 0.082

shaper_freq_y: 38.8
shaper_type_y: mzv
damping_ratio_y: 0.0683

#shaper_freq_y: 54.0
#shaper_type_y: zv
#damping_ratio_y: 0.0523

# -----------------------------------------------------------------------------
# LOAD CELL  (HX711 - front left under-bed)
# Already calibrated: counts_per_gram and reference_tare_counts in SAVE_CONFIG
# -----------------------------------------------------------------------------
[load_cell]
sensor_type: hx711
sclk_pin: PA4
dout_pin: PC6
# gain: A-128        # default, fine as-is
# sample_rate: 80    # default — NOTE: HX711 max safe probe speed is 2mm/s
                     # Upgrade to HX717 for higher speed / better accuracy

# -----------------------------------------------------------------------------
# LOAD CELL PROBE
# Used for Z homing only — NOT for bed mesh
# -----------------------------------------------------------------------------
[load_cell_probe]
load_cell: load_cell
trigger_force: 50           # grams — conservative start, tune up if false triggers
force_safety_limit: 2000    # grams (2kg) — shuts down if exceeded, protects toolhead
speed: 2                    # mm/s — HX711 hard limit per Klipper docs (<2mm/s)
samples: 2
sample_retract_dist: 2.0
samples_tolerance: 0.050
samples_tolerance_retries: 3

# -----------------------------------------------------------------------------
# STEPPER X
# -----------------------------------------------------------------------------
[stepper_x]
step_pin: PC2
dir_pin: !PB9
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: ~!PA5
position_endstop: -6
position_min: -6
position_max: 230
homing_speed: 80

[tmc2208 stepper_x]
uart_pin: PB12
run_current: 0.7
sense_resistor: 0.150
interpolate: True

# -----------------------------------------------------------------------------
# STEPPER Y
# -----------------------------------------------------------------------------
[stepper_y]
step_pin: PB8
dir_pin: PB7
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: ~!PA6
position_endstop: -14
position_min: -14
position_max: 230
homing_speed: 80

[tmc2208 stepper_y]
uart_pin: PB13
run_current: 0.8
sense_resistor: 0.150
interpolate: True

# -----------------------------------------------------------------------------
# STEPPER Z
# IMPORTANT CHANGES:
#   - endstop_pin is now a DUMMY pin (PB0 / beeper, unused)
#     It will NEVER be triggered — homing_override intercepts all G28 Z moves
#   - homing_speed reduced to 2mm/s (HX711 hard limit from Klipper docs)
#   - homing_retract_dist: 0 — load_cell_probe handles retraction itself
#   - position_endstop: 0 — required when using a real pin; actual Z=0
#     is set dynamically by SET_KINEMATIC_POSITION in the homing macro
# -----------------------------------------------------------------------------
[stepper_z]
step_pin: PB6
dir_pin: !PB5
enable_pin: !PC3
microsteps: 16
rotation_distance: 8
endstop_pin: ^PB0          # DUMMY PIN — beeper pin, pulled high, never triggered
                            # homing_override takes full control of Z homing
position_endstop: 0
position_min: -3
position_max: 225
homing_speed: 2             # HX711 max safe speed per Klipper docs
second_homing_speed: 1
homing_retract_dist: 0      # load_cell_probe handles its own retraction

[tmc2208 stepper_z]
uart_pin: PB14
run_current: 0.8
sense_resistor: 0.150
interpolate: True

# -----------------------------------------------------------------------------
# EXTRUDER
# -----------------------------------------------------------------------------
[extruder]
max_extrude_cross_section: 5
max_extrude_only_distance: 1000.0
step_pin: PB4
dir_pin: PB3
enable_pin: !PC3
microsteps: 16
rotation_distance: 7.44
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PA1
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC5
min_temp: 0
max_temp: 260
max_extrude_only_velocity: 15
max_extrude_only_accel: 3000
min_extrude_temp: 170

# -----------------------------------------------------------------------------
# HEATED BED
# -----------------------------------------------------------------------------
[heater_bed]
heater_pin: PB2
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
min_temp: 0
max_temp: 100

# -----------------------------------------------------------------------------
# FANS
# -----------------------------------------------------------------------------
[heater_fan hotend_fan]
pin: PA0

[fan]
pin: PC1

# -----------------------------------------------------------------------------
# PRINTER
# -----------------------------------------------------------------------------
[printer]
kinematics: cartesian
max_velocity: 400
max_accel: 6000
max_z_velocity: 5
square_corner_velocity: 5.0
max_z_accel: 100

# -----------------------------------------------------------------------------
# CR TOUCH (BLTouch) — BED MESH ONLY
# Z offset is irrelevant for Z homing (load cell sets Z=0)
# Keep z_offset in SAVE_CONFIG as a reference for mesh topology offsets only
# -----------------------------------------------------------------------------
[bltouch]
sensor_pin: ^PC14
control_pin: PC13
x_offset: -23.0
y_offset: -14.5
speed: 20
pin_move_time: 0.4
stow_on_each_sample: False
probe_with_touch_mode: True

# -----------------------------------------------------------------------------
# HOMING OVERRIDE
# Replaces [safe_z_home] entirely.
# Sequence: Home X & Y with endstops → move over load cell → home Z via probe
# NOTE: [safe_z_home] has been removed — homing_override handles everything
# -----------------------------------------------------------------------------
[homing_override]
axes: xyz
gcode:
    G90                                 # absolute positioning

    # Home X and Y first using their endstops as normal
    {% if 'x' not in printer.toolhead.homed_axes %}
        G28 X
    {% endif %}
    {% if 'y' not in printer.toolhead.homed_axes %}
        G28 Y
    {% endif %}

    # Move nozzle over the front-left load cell position
    # Your front-left bed screw is at 54.5, 45.5 — nozzle has no offset
    # since the load cell is under the bed, not on the toolhead
    G1 X54.5 Y45.5 F6000

    # Call Z homing macro
    _HOME_Z

# Helper: reads last probe result and sets actual Z position
# Must be a separate macro — printer.probe.last_probe_position is only
# visible AFTER the PROBE command returns, which requires a sub-call
[gcode_macro _HOME_Z_FROM_LAST_PROBE]
gcode:
    {% set z_probed   = printer.probe.last_probe_position.z %}
    {% set z_position = printer.toolhead.position[2] %}
    {% set z_actual   = z_position - z_probed %}
    SET_KINEMATIC_POSITION Z={z_actual}

# Main Z homing macro: fast tap → set position → lift → accurate tap → set position
[gcode_macro _HOME_Z]
gcode:
    SET_GCODE_OFFSET Z=0               # load cell probes need no Z offset

    # Pretend we are at max Z so the toolhead can move before Z is homed
    SET_KINEMATIC_POSITION Z={printer.toolhead.axis_maximum[2]}

    # Fast first tap (coarse)
    PROBE PROBE_SPEED={2 * 60}         # 2mm/s — HX711 max safe speed
    _HOME_Z_FROM_LAST_PROBE

    # Lift 2mm clear of bed
    G91
    G1 Z2 F120
    G90

    # Accurate second tap (slow)
    PROBE PROBE_SPEED={1 * 60}         # 1mm/s — accurate tap
    _HOME_Z_FROM_LAST_PROBE

    # Lift to 10mm for clearance
    G91
    G1 Z10 F300
    G90

# -----------------------------------------------------------------------------
# BED MESH — unchanged, still uses CR Touch
# -----------------------------------------------------------------------------
[bed_mesh]
speed: 120
horizontal_move_z: 5
mesh_min: 30,30
mesh_max: 207,215.5
probe_count: 13,13
algorithm: bicubic

# -----------------------------------------------------------------------------
# SCREW TILT ADJUST — unchanged
# -----------------------------------------------------------------------------
[screws_tilt_adjust]
screw4: 54.5, 45.5
screw4_name: front left screw
screw2: 224.5, 45.5
screw2_name: front right screw
screw3: 224.5, 215.5
screw3_name: rear right screw
screw1: 54.5, 215.5
screw1_name: rear left screw
horizontal_move_z: 10.
speed: 50.
screw_thread: CCW-M4

# =============================================================================
# NOTES FOR COMMISSIONING (read before first G28):
#
# STEP 1: Run LOAD_CELL_DIAGNOSTIC
#         Check: sample rate ~80/s, saturated=0, unique values high, tap test works
#
# STEP 2: Load cell is already calibrated (counts_per_gram in SAVE_CONFIG)
#         If you re-calibrate, use LOAD_CELL_CALIBRATE and place known weight on bed
#
# STEP 3: Run LOAD_CELL_TEST_TAP
#         Tap the bed by hand 3 times — confirm Klipper detects each tap
#         ONLY proceed to G28 if this passes
#
# STEP 4: Run G28 — watch for errors, check Z lands at ~0mm above bed
#
# STEP 5: Re-run BED_MESH_CALIBRATE (CR Touch does mesh as before)
#
# STEP 6: Consider adding M109 S140 before G28 in your start gcode
#         Klipper docs recommend probing below filament ooze temp (~140C)
#         Then heat to print temp AFTER homing is complete
#
# STEP 7: (Optional later) Add [z_thermal_adjust] if nozzle growth between
#         probing temp and print temp causes first layer offset issues
# =============================================================================

