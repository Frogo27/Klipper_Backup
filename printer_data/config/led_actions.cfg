[neopixel _MMU_Lights]
pin: PICO_MMU: gpio14
chain_count: 4
color_order: GRB

[gcode_macro _SP_NOTIFY]
gcode:
    {% set action = params.ACTION|default("")|string %}
    {% set lane = params.LANE|default(printer.save_variables.variables.last_loaded_lane)|default(-1)|int %}
    {% set complete = params.COMPLETE|default(1)|int %}
    {% set error = params.ERROR|default(0)|int %}
    {% set sp = printer["gcode_macro _SP_VARS"] %}
    
    {% if sp.debug == 1 %}
      M118 { rawparams }
    {% endif %}
    
    _SP_LED_ACTIONS ACTION={ action } LANE={ lane } COMPLETE={ complete } ERROR={ error }

[gcode_macro _SP_VARS]
variable_debug: 1
# LED mapping per lane
variable_null_color: "OFF"	
variable_led_map: {
    -1: [0],   # NO LANE
    0: [1],    # LANE 0
    1: [2],    # LANE 1
    2: [3],    # LANE 2
    3: [4]     # GUEST LANE
 }
	
gcode:

# ─── Blink state variables ────────────────────────────────────────────────────

[gcode_macro _BLINK_STATE]
variable_indices: []
variable_color_r: 0.0
variable_color_g: 0.0
variable_color_b: 0.0
variable_count: 0
variable_on: 0
gcode:

# ─── Non-blocking blink trigger ───────────────────────────────────────────────
# INDICES is a comma-separated string e.g. "1,2,4"

[gcode_macro _BLINK_START]
gcode:
    {% set indices_str = params.INDICES|default("")|string %}
    {% set r = params.R|default(0)|float %}
    {% set g = params.G|default(0)|float %}
    {% set b = params.B|default(0)|float %}
    {% set count = params.COUNT|default(6)|int %}

    # Parse comma-separated string into a list of ints, skipping 0
    {% set indices = [] %}
    {% for part in indices_str.split(",") %}
        {% set i = part.strip()|int %}
        {% if i >= 1 %}
            {% set _ = indices.append(i) %}
        {% endif %}
    {% endfor %}

    SET_GCODE_VARIABLE MACRO=_BLINK_STATE VARIABLE=indices VALUE={ indices }
    SET_GCODE_VARIABLE MACRO=_BLINK_STATE VARIABLE=color_r  VALUE={ r }
    SET_GCODE_VARIABLE MACRO=_BLINK_STATE VARIABLE=color_g  VALUE={ g }
    SET_GCODE_VARIABLE MACRO=_BLINK_STATE VARIABLE=color_b  VALUE={ b }
    SET_GCODE_VARIABLE MACRO=_BLINK_STATE VARIABLE=count    VALUE={ count * 2 }
    SET_GCODE_VARIABLE MACRO=_BLINK_STATE VARIABLE=on       VALUE=1

    # Cancel any in-progress blink, then start fresh
    UPDATE_DELAYED_GCODE ID=_BLINK_TICK DURATION=0.001

[delayed_gcode _BLINK_TICK]
initial_duration: 0
gcode:
    {% set s = printer["gcode_macro _BLINK_STATE"] %}
    {% if s.count > 0 %}
        {% if s.on == 1 %}
            {% for idx in s.indices %}
                SET_LED LED=_MMU_Lights RED={ s.color_r } GREEN={ s.color_g } BLUE={ s.color_b } INDEX={ idx }
            {% endfor %}
            SET_GCODE_VARIABLE MACRO=_BLINK_STATE VARIABLE=on VALUE=0
        {% else %}
            {% for idx in s.indices %}
                SET_LED LED=_MMU_Lights RED=0 GREEN=0 BLUE=0 INDEX={ idx }
            {% endfor %}
            SET_GCODE_VARIABLE MACRO=_BLINK_STATE VARIABLE=on VALUE=1
        {% endif %}
        SET_GCODE_VARIABLE MACRO=_BLINK_STATE VARIABLE=count VALUE={ s.count - 1 }
        UPDATE_DELAYED_GCODE ID=_BLINK_TICK DURATION=0.5
    {% endif %}

# ─── Main LED action handler ──────────────────────────────────────────────────

[gcode_macro _SP_LED_ACTIONS]
gcode:
    {% set action = params.ACTION|default("")|string %}
    {% set lane = params.LANE|default(printer.save_variables.variables.last_loaded_lane)|default(-1)|int %}
    {% set complete = params.COMPLETE|default(1)|int %}
    {% set error = params.ERROR|default(0)|int %}
    {% set sp = printer["gcode_macro _SP_VARS"] %}

    # Define colors (brightness values from 0.0 to 1.0)
    {% set COLORS = {
        "GREEN": {"r": 0.0, "g": 1.0, "b": 0.0},
        "BLUE": {"r": 0.0, "g": 0.0, "b": 1.0},
        "YELLOW": {"r": 1.0, "g": 1.0, "b": 0.0},
        "RED": {"r": 1.0, "g": 0.0, "b": 0.0},
        "PURPLE": {"r": 1.0, "g": 0.0, "b": 1.0},
        "OFF": {"r": 0.0, "g": 0.0, "b": 0.0},
        "WHITE": {"r": 0.1, "g": 0.1, "b": 0.1}
    } %}

    # Get LED indices for current and previous lane
    {% set led_indices = sp.led_map.get(lane, []) %}
    {% set prev_lane = printer.save_variables.variables.previous_lane|default(-1)|int %}
    {% set prev_led_indices = sp.led_map.get(prev_lane, []) %}

    # Build comma-separated index strings for _BLINK_START
    {% set lane_str = led_indices|join(",") %}
    {% set combined_str = (led_indices + prev_led_indices)|unique|list|join(",") %}
    {% set all_str = sp.led_map.values()|sum(start=[])|unique|list|join(",") %}

    # Helper to set an LED color with validation
    {% macro set_led(index, color) -%}
      {% if index >= 1 %}
        SET_LED LED=_MMU_Lights RED={ color.r } GREEN={ color.g } BLUE={ color.b } INDEX={ index }
      {% endif %}
    {%- endmacro %}

    # Helper to set all LEDs for a lane
    {% macro set_lane_leds(indices, color) -%}
      {% for index in indices %}
        { set_led(index, color) }
      {% endfor %}
    {%- endmacro %}

    # Helper to set all LEDs across all lanes
    {% macro set_all_leds(color) -%}
      {% for indices in sp.led_map.values() %}
        {% for index in indices %}
          { set_led(index, color) }
        {% endfor %}
      {% endfor %}
    {%- endmacro %}

    # Error: blink all LEDs red (non-blocking)
    {% if error == 1 %}
        { set_all_leds(COLORS["RED"]) }
        _BLINK_START INDICES={ all_str } R=1 G=0 B=0 COUNT=10

    # No lane: all LEDs to null color
    {% elif lane == -1 %}
        { set_all_leds(COLORS[sp.null_color]) }
        { set_lane_leds(led_indices, COLORS["GREEN"]) }

    # Lane loaded: solid green on active lane
    {% elif action == "loaded" %}
        { set_all_leds(COLORS[sp.null_color]) }
        { set_lane_leds(led_indices, COLORS["GREEN"]) }

    # Hub operations: blink blue on active lane (non-blocking)
    {% elif action in ["hub_loading", "hub_unloading"] %}
        _BLINK_START INDICES={ lane_str } R=0 G=0 B=1 COUNT=10

    # Extruder unloading: blink yellow on active lane (non-blocking)
    {% elif action == "extruder_unloading" %}
        _BLINK_START INDICES={ lane_str } R=1 G=1 B=0 COUNT=6

    # Hotend/extruder loading or unloading: blink yellow on both lanes (non-blocking)
    {% elif action in ["hotend_loading", "hotend_unloading", "extruder_loading"] %}
        _BLINK_START INDICES={ combined_str } R=1 G=1 B=0 COUNT=5

    # Runout: solid red on active lane
    {% elif action == "runout" %}
        { set_lane_leds(led_indices, COLORS["RED"]) }

    # Pause: solid purple on all LEDs
    {% elif action == "pause" %}
        { set_all_leds(COLORS["PURPLE"]) }

    # Print end: blink all green (non-blocking)
    {% elif action == "print_end" %}
        { set_all_leds(COLORS["OFF"]) }
        _BLINK_START INDICES={ all_str } R=0 G=1 B=0 COUNT=10

    {% endif %}

    # Save current lane for reference
    SAVE_VARIABLE VARIABLE=previous_lane VALUE={ lane }

# ─── LED test macro ───────────────────────────────────────────────────────────

[gcode_macro TEST_SP_LEDS]
gcode:
    SET_LED LED=_MMU_Lights RED=0.0 GREEN=1.0 BLUE=0.0 INDEX=1
    G4 P5000
    SET_LED LED=_MMU_Lights RED=0.0 GREEN=0.0 BLUE=0.0 INDEX=1
    SET_LED LED=_MMU_Lights RED=0.0 GREEN=1.0 BLUE=0.0 INDEX=2
    G4 P5000
    SET_LED LED=_MMU_Lights RED=0.0 GREEN=0.0 BLUE=0.0 INDEX=2
    SET_LED LED=_MMU_Lights RED=0.0 GREEN=1.0 BLUE=0.0 INDEX=3
    G4 P5000
    SET_LED LED=_MMU_Lights RED=0.0 GREEN=0.0 BLUE=0.0 INDEX=3
    SET_LED LED=_MMU_Lights RED=0.0 GREEN=1.0 BLUE=0.0 INDEX=4
    G4 P5000
    SET_LED LED=_MMU_Lights RED=0.0 GREEN=0.0 BLUE=0.0 INDEX=4
