[neopixel _MMU_Lights]
pin: PICO_MMU: gpio14
chain_count: 4
color_order: GRB

[gcode_macro _SP_VARS]
variable_debug: 0
# Simple LED mapping per lane - now with 4 lanes + guest lane and 4 LEDs
variable_simple_led_map: {
    -1: ["LED_0", "LED_1", "LED_2", "LED_3"],  # NO LANE - all LEDs
    0: ["LED_0"],                             # LANE 0
    1: ["LED_1"],                             # LANE 1
    2: ["LED_2"],                             # LANE 2
    3: ["LED_3"],                             # LANE 3
    4: ["LED_0", "LED_1", "LED_2", "LED_3"]   # GUEST LANE - all LEDs flash in pattern
    }

gcode:

[gcode_macro _SP_LED_ACTIONS]
gcode:
    {% set action = params.ACTION|default("")|string %}
    {% set lane = params.LANE|default(printer.save_variables.variables.last_loaded_lane)|default(-1)|int %}
    {% set complete = params.COMPLETE|default(1)|int %}
    {% set error = params.ERROR|default(0)|int %}
    {% set sp = printer["gcode_macro _SP_VARS"] %}
    
    # Get LED array for the current lane
    {% set led_pins = sp.simple_led_map.get(lane, []) %}
    {% set prev_lane = printer.save_variables.variables.previous_lane|default(-1)|int %}
    {% set prev_led_pins = sp.simple_led_map.get(prev_lane, []) %}
    
    # Helper to set a single LED on or off
    {% macro set_led(pin_name, state) -%}
      SET_PIN PIN={ pin_name } VALUE={ state }
    {%- endmacro %}
    
    # Helper to set all LEDs for a lane
    {% macro set_lane_leds(pins, state) -%}
      {% for pin in pins %}
        { set_led(pin, state) }
      {% endfor %}
    {%- endmacro %}
    
    # Helper to set all LEDs
    {% macro set_all_leds(state) -%}
      { set_led("LED_0", state) }
      { set_led("LED_1", state) }
      { set_led("LED_2", state) }
      { set_led("LED_3", state) }
    {%- endmacro %}
    
    # Error handling: Blink all LEDs 10 times
    {% if error == 1 %}
      {% for _ in range(10) %}
        { set_all_leds(1) }
        G4 P250
        { set_all_leds(0) }
        G4 P250
      {% endfor %}
      { set_all_leds(1) }  # End with all LEDs on for error state
    
    # No specific lane or idle state
    {% elif lane == -1 %}
      { set_all_leds(1) }  # All LEDs on
    
    # Guest lane (special handling)
    {% elif lane == 4 %}
      # Special pattern for guest lane - circular chasing pattern
      {% for _ in range(3) %}
        { set_all_leds(0) }
        { set_led("LED_0", 1) }
        G4 P200
        { set_led("LED_0", 0) }
        { set_led("LED_1", 1) }
        G4 P200
        { set_led("LED_1", 0) }
        { set_led("LED_2", 1) }
        G4 P200
        { set_led("LED_2", 0) }
        { set_led("LED_3", 1) }
        G4 P200
      {% endfor %}
      { set_all_leds(1) }  # End with all LEDs on for guest mode
    
    # Lane loaded
    {% elif action == "loaded" %}
      { set_all_leds(0) }  # First clear all LEDs
      {% if lane == 4 %}   # Guest lane
        { set_all_leds(1) }
      {% else %}
        { set_lane_leds(led_pins, 1) }  # Then light up only the specific lane's LED
      {% endif %}
    
    # Hub operations (loading/unloading)
    {% elif action in ["hub_loading", "hub_unloading"] %}
      {% for _ in range(5) %}
        { set_lane_leds(led_pins, 1) }
        G4 P500
        { set_lane_leds(led_pins, 0) }
        G4 P500
      {% endfor %}
      { set_lane_leds(led_pins, 1) }  # End with lane LEDs on
    
    # Extruder unloading
    {% elif action == "extruder_unloading" %}
      { set_lane_leds(led_pins, 1) }
    
    # Hotend or extruder loading/unloading - blink between old and new lane
    {% elif action in ["hotend_loading", "hotend_unloading", "extruder_loading"] %}
      {% for _ in range(5) %}
        { set_lane_leds(prev_led_pins, 1) }
        { set_lane_leds(led_pins, 0) }
        G4 P400
        { set_lane_leds(prev_led_pins, 0) }
        { set_lane_leds(led_pins, 1) }
        G4 P400
      {% endfor %}
      { set_lane_leds(led_pins, 1) }  # End with new lane LED on
    
    # Runout - rapid blinking of the lane LED
    {% elif action == "runout" %}
      {% for _ in range(10) %}
        { set_lane_leds(led_pins, 1) }
        G4 P200
        { set_lane_leds(led_pins, 0) }
        G4 P200
      {% endfor %}
      { set_lane_leds(led_pins, 1) }  # End with LED on
    
    # Pause - all LEDs on
    {% elif action == "pause" %}
      { set_all_leds(1) }
    
    # Print end - victory blink pattern
    {% elif action == "print_end" %}
      {% for _ in range(3) %}
        { set_led("LED_0", 1) }
        G4 P250
        { set_led("LED_1", 1) }
        G4 P250
        { set_led("LED_2", 1) }
        G4 P250
        { set_led("LED_3", 1) }
        G4 P250
        { set_all_leds(0) }
        G4 P500
      {% endfor %}
      
      # Light up the last used lane LED
      {% if prev_lane > -1 and prev_lane < 4 %}
        { set_lane_leds(prev_led_pins, 1) }
      {% elif prev_lane == 4 %}  # Guest lane
        { set_all_leds(1) }
      {% endif %}
    {% endif %}
    
    # Save current lane for reference
    SAVE_VARIABLE VARIABLE=previous_lane VALUE={ lane }